---
- name: Setup Netdata si Basic Auth
  hosts: app
  become: yes

  tasks:
    - name: Install epel
      ansible.builtin.yum:
        name:
          - epel-release       
        state: present

    - name: Install packages
      ansible.builtin.yum:
        name:
          - curl
          - nginx
          - httpd-tools        
          - python3-passlib       
        state: present 
    
    - name: Install netdata
      shell: |
        bash <(curl -SsL https://my-netdata.io/kickstart.sh) --disable-telemetry --non-interactive
      args:
        creates: /usr/sbin/netdata
        

    - name: Start netdata
      systemd:
        name: netdata
        state: started
        enabled: yes

    - name: Config Basic Authentication
      htpasswd:
        path: /etc/nginx/.htpasswd
        name: "admin"
        password: "admin"

    - name: config nginx for netdata
      ansible.builtin.copy:
        dest: /etc/nginx/conf.d/nginx.conf
        content: |
          server {
              listen 80;
              server_name netdata.fiipractic.lan;
              return 301 https://$host$request_uri;
          }

          server {
              listen 443 ssl;
              server_name netdata.fiipractic.lan;

              ssl_certificate "/etc/pki/tls/certs/fiipractic.crt";
              ssl_certificate_key "/etc/pki/tls/private/fiipractic.key";

              auth_basic "Restricted Access";
              auth_basic_user_file /etc/nginx/.htpasswd;

              location / {
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_pass http://127.0.0.1:19999;
          }
          }
      notify: Restart Nginx

  handlers:
    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes