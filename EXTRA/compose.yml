services:
  spring1:
    build: 
      dockerfile: Dockerfile
    container_name: spring1
    expose:
      - "8080"
    environment:
      - MY_VAR=100
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: '512M'

  spring2:
    build: 
      dockerfile: Dockerfile
    container_name: spring2
    expose:
      - "8080" 
    environment:
      - MY_VAR=200
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: '512M'

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    deploy:
      resources:
        limits:
          cpus: '0.67'
          memory: '512M'
    depends_on:
      - spring1
      - spring2
